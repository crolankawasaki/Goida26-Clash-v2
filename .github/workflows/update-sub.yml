name: Build Goida 26 config (rock-solid Reality fix)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Run Updater
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
        run: |
          cat > updater.py << 'EOF'
          import os, sys, base64, json, re, yaml
          import requests
          from urllib.parse import urlparse, parse_qs
          from datetime import datetime, timezone

          SOURCE_URL = os.environ['SOURCE_URL']
          OUTPUT_FILE = "config.yaml"

          # ---------- Вспомогательные функции ----------
          def is_valid_hex(s):
              return bool(re.fullmatch(r'[0-9a-fA-F]+', s))

          def fix_reality_short_id(proxy, name):
              """Гарантирует, что short-id корректен (не менее 2 hex‑символов)."""
              if "reality-opts" in proxy:
                  sid = proxy["reality-opts"].get("short-id", "")
                  if not sid or not is_valid_hex(sid) or len(sid) < 2:
                      print(f"⚠️ Исправлен short-id для {name}: был '{sid}', стал '00'")
                      proxy["reality-opts"]["short-id"] = "00"

          # ---------- Парсеры (все протоколы) ----------
          def parse_vmess(uri):
              try:
                  b64_part = uri[8:].strip()
                  padding = 4 - (len(b64_part) % 4)
                  if padding != 4:
                      b64_part += '=' * padding
                  decoded = base64.b64decode(b64_part).decode('utf-8')
                  vmess_json = json.loads(decoded)
                  proxy = {
                      "name": vmess_json.get("ps", "VMess"),
                      "type": "vmess",
                      "server": vmess_json.get("add", ""),
                      "port": int(vmess_json.get("port", 0)),
                      "uuid": vmess_json.get("id", ""),
                      "alterId": int(vmess_json.get("aid", 0)),
                      "cipher": vmess_json.get("scy", "auto"),
                      "network": vmess_json.get("net", "tcp"),
                      "udp": True
                  }
                  net = vmess_json.get("net", "tcp")
                  if net == "ws":
                      proxy["ws-opts"] = {
                          "path": vmess_json.get("path", "/"),
                          "headers": {"Host": vmess_json.get("host", vmess_json.get("add", ""))}
                      }
                  elif net == "grpc":
                      proxy["grpc-opts"] = {"grpc-service-name": vmess_json.get("path", "")}
                  if vmess_json.get("tls") == "tls":
                      proxy["tls"] = True
                      proxy["skip-cert-verify"] = True
                      proxy["sni"] = vmess_json.get("sni", vmess_json.get("add", ""))
                  return proxy
              except:
                  return None

          def parse_trojan(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "Trojan"
                  proxy = {
                      "name": name,
                      "type": "trojan",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "password": parsed.username or "",
                      "udp": True,
                      "skip-cert-verify": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "sni" in query:
                          proxy["sni"] = query["sni"][0]
                      if "type" in query:
                          net_type = query["type"][0]
                          if net_type == "ws":
                              proxy["network"] = "ws"
                              proxy["ws-opts"] = {
                                  "path": query.get("path", ["/"])[0],
                                  "headers": {"Host": query.get("host", [parsed.hostname])[0]}
                              }
                          elif net_type == "grpc":
                              proxy["network"] = "grpc"
                              proxy["grpc-opts"] = {"grpc-service-name": query.get("serviceName", [""])[0]}
                  return proxy
              except:
                  return None

          def parse_shadowsocks(uri):
              try:
                  if "#" in uri:
                      uri_part, name_part = uri.split("#", 1)
                      name = requests.utils.unquote(name_part)
                  else:
                      uri_part = uri
                      name = "Shadowsocks"
                  uri_part = uri_part[5:]
                  if '@' in uri_part:
                      userinfo, server_port = uri_part.split('@', 1)
                      try:
                          padding = 4 - (len(userinfo) % 4)
                          if padding != 4:
                              userinfo += '=' * padding
                          decoded = base64.b64decode(userinfo).decode('utf-8')
                          cipher, password = decoded.split(':', 1)
                      except:
                          if ':' in userinfo:
                              cipher, password = userinfo.split(':', 1)
                          else:
                              cipher, password = "aes-256-gcm", userinfo
                      server, port = server_port.rsplit(':', 1)
                      return {
                          "name": name,
                          "type": "ss",
                          "server": server,
                          "port": int(port),
                          "cipher": cipher,
                          "password": password,
                          "udp": True
                      }
                  return None
              except:
                  return None

          def parse_vless(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "VLESS"
                  proxy = {
                      "name": name,
                      "type": "vless",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "uuid": parsed.username or "",
                      "udp": True,
                      "skip-cert-verify": True,
                      "encryption": "none"
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "security" in query and query["security"][0] == "reality":
                          pbk = query.get("pbk", [""])[0]
                          sid = query.get("sid", [""])[0]
                          # Принудительно исправляем sid, если он невалидный
                          if not sid or not is_valid_hex(sid) or len(sid) < 2:
                              sid = "00"
                          proxy["flow"] = query.get("flow", ["xtls-rprx-vision"])[0]
                          proxy["client-fingerprint"] = query.get("fp", ["chrome"])[0]
                          proxy["servername"] = query.get("sni", [parsed.hostname])[0]
                          proxy["reality-opts"] = {
                              "public-key": pbk,
                              "short-id": sid
                          }
                      elif "security" in query and query["security"][0] == "tls":
                          proxy["tls"] = True
                      if "sni" in query:
                          proxy["sni"] = query["sni"][0]
                      if "type" in query:
                          net_type = query["type"][0]
                          if net_type == "ws":
                              proxy["network"] = "ws"
                              proxy["ws-opts"] = {
                                  "path": query.get("path", ["/"])[0],
                                  "headers": {"Host": query.get("host", [parsed.hostname])[0]}
                              }
                          elif net_type == "grpc":
                              proxy["network"] = "grpc"
                              proxy["grpc-opts"] = {"grpc-service-name": query.get("serviceName", [""])[0]}
                  # Дополнительная гарантия исправления прямо здесь
                  if "reality-opts" in proxy:
                      fix_reality_short_id(proxy, name)
                  return proxy
              except:
                  return None

          def parse_hysteria(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "Hysteria"
                  proxy = {
                      "name": name,
                      "type": "hysteria",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "up": 100,
                      "down": 100,
                      "skip-cert-verify": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "auth" in query:
                          proxy["auth-str"] = query["auth"][0]
                      if "peer" in query:
                          proxy["sni"] = query["peer"][0]
                      if "upmbps" in query:
                          proxy["up"] = int(query["upmbps"][0])
                      if "downmbps" in query:
                          proxy["down"] = int(query["downmbps"][0])
                  return proxy
              except:
                  return None

          def parse_hysteria2(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "Hysteria2"
                  password = parsed.username or ""
                  proxy = {
                      "name": name,
                      "type": "hysteria2",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "password": password,
                      "skip-cert-verify": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "auth" in query and not password:
                          proxy["password"] = query["auth"][0]
                      if "sni" in query:
                          proxy["sni"] = query["sni"][0]
                  return proxy
              except:
                  return None

          def parse_tuic(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "Tuic"
                  uuid = ""
                  password = ""
                  if parsed.username and ':' in parsed.username:
                      uuid, password = parsed.username.split(':', 1)
                  else:
                      uuid = parsed.username or ""
                  proxy = {
                      "name": name,
                      "type": "tuic",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "uuid": uuid,
                      "password": password,
                      "udp": True,
                      "skip-cert-verify": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "sni" in query:
                          proxy["sni"] = query["sni"][0]
                  return proxy
              except:
                  return None

          def parse_wireguard(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "WireGuard"
                  proxy = {
                      "name": name,
                      "type": "wireguard",
                      "server": parsed.hostname,
                      "port": parsed.port or 51820,
                      "private-key": parsed.username or "",
                      "udp": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "publicKey" in query:
                          proxy["public-key"] = query["publicKey"][0]
                      if "address" in query:
                          addresses = query["address"][0].split(',')
                          proxy["ip"] = addresses[0] if addresses else None
                      if "mtu" in query:
                          proxy["mtu"] = int(query["mtu"][0])
                  return proxy
              except:
                  return None

          def parse_socks5(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "SOCKS5"
                  proxy = {
                      "name": name,
                      "type": "socks5",
                      "server": parsed.hostname,
                      "port": parsed.port or 1080,
                      "udp": True
                  }
                  if parsed.username and parsed.password:
                      proxy["username"] = parsed.username
                      proxy["password"] = parsed.password
                  return proxy
              except:
                  return None

          def parse_http(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "HTTP"
                  proxy = {
                      "name": name,
                      "type": "http",
                      "server": parsed.hostname,
                      "port": parsed.port or 8080,
                  }
                  if parsed.username and parsed.password:
                      proxy["username"] = parsed.username
                      proxy["password"] = parsed.password
                  if parsed.scheme == "https":
                      proxy["tls"] = True
                      proxy["skip-cert-verify"] = True
                  return proxy
              except:
                  return None

          def parse_shadowtls(uri):
              try:
                  parsed = urlparse(uri)
                  name = requests.utils.unquote(parsed.fragment) if parsed.fragment else "ShadowTLS"
                  proxy = {
                      "name": name,
                      "type": "shadowtls",
                      "server": parsed.hostname,
                      "port": parsed.port or 443,
                      "version": 3,
                      "skip-cert-verify": True
                  }
                  if parsed.query:
                      query = parse_qs(parsed.query)
                      if "password" in query:
                          proxy["password"] = query["password"][0]
                      if "sni" in query:
                          proxy["sni"] = query["sni"][0]
                  return proxy
              except:
                  return None

          # ---------- Сбор всех прокси ----------
          def parse_proxies_from_text(text):
              proxies = []
              lines = text.strip().split('\n')
              parsers = {
                  'vmess://': parse_vmess,
                  'trojan://': parse_trojan,
                  'ss://': parse_shadowsocks,
                  'vless://': parse_vless,
                  'socks5://': parse_socks5,
                  'socks://': parse_socks5,
                  'http://': parse_http,
                  'https://': parse_http,
                  'hysteria://': parse_hysteria,
                  'hysteria2://': parse_hysteria2,
                  'hy2://': parse_hysteria2,
                  'tuic://': parse_tuic,
                  'wireguard://': parse_wireguard,
                  'wg://': parse_wireguard,
                  'shadowtls://': parse_shadowtls,
              }
              for line in lines:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  for prefix, parser in parsers.items():
                      if line.startswith(prefix):
                          proxy = parser(line)
                          if proxy:
                              proxies.append(proxy)
                          break
              return proxies

          def fix_duplicate_names(proxies):
              name_counts = {}
              fixed = []
              for p in proxies:
                  name = p["name"]
                  if name in name_counts:
                      name_counts[name] += 1
                      new_name = f"{name} ({name_counts[name]})"
                      while new_name in name_counts:
                          name_counts[name] += 1
                          new_name = f"{name} ({name_counts[name]})"
                      p["name"] = new_name
                      name = new_name
                  else:
                      name_counts[name] = 1
                  fixed.append(p)
              return fixed

          def validate_all_reality_proxies(proxies):
              """Финальная проверка: у всех Reality-прокси short-id должен быть валидным."""
              for proxy in proxies:
                  if proxy.get("type") == "vless" and "reality-opts" in proxy:
                      fix_reality_short_id(proxy, proxy.get("name", "unknown"))

          # ---------- Главный блок ----------
          def main():
              print("🚀 Загрузка списка прокси...")
              try:
                  response = requests.get(SOURCE_URL, timeout=30)
                  response.raise_for_status()
                  content = response.text
              except Exception as e:
                  print(f"❌ Ошибка загрузки: {e}")
                  sys.exit(1)

              print("🔍 Парсинг всех форматов (с двойной защитой Reality)...")
              all_proxies = parse_proxies_from_text(content)
              total_parsed = len(all_proxies)
              print(f"📦 Распознано прокси: {total_parsed}")

              if not all_proxies:
                  print("❌ Нет ни одного прокси")
                  sys.exit(1)

              # Финальная валидация Reality short-id
              validate_all_reality_proxies(all_proxies)

              all_proxies = fix_duplicate_names(all_proxies)
              proxy_names = [p["name"] for p in all_proxies]

              config = {
                  "proxies": all_proxies,
                  "proxy-groups": [
                      {
                          "name": "🚀 Auto-Select",
                          "type": "url-test",
                          "proxies": proxy_names,
                          "url": "http://www.gstatic.com/generate_204",
                          "interval": 300
                      },
                      {
                          "name": "🌍 Proxy",
                          "type": "select",
                          "proxies": ["🚀 Auto-Select", "DIRECT"] + proxy_names
                      },
                      {
                          "name": "🛑 Direct",
                          "type": "select",
                          "proxies": ["DIRECT"]
                      }
                  ],
                  "rules": [
                      "DOMAIN-SUFFIX,local,DIRECT",
                      "IP-CIDR,10.0.0.0/8,DIRECT",
                      "IP-CIDR,127.0.0.0/8,DIRECT",
                      "IP-CIDR,172.16.0.0/12,DIRECT",
                      "IP-CIDR,192.168.0.0/16,DIRECT",
                      "MATCH,🚀 Auto-Select"
                  ]
              }

              with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
                  f.write('# Goida 26 by Crolan\n')
                  yaml.dump(config, f, allow_unicode=True, sort_keys=False)

              print(f"✅ config.yaml сохранён, {len(all_proxies)} прокси (все Reality исправлены).")

              # Обновление README
              now = datetime.now(timezone.utc).strftime('%d.%m.%Y %H:%M UTC')
              count_str = f'🔄 **Сейчас в подписке:** {len(all_proxies)} серверов  \n🕒 **Последнее обновление:** {now}'
              try:
                  with open('README.md', 'r', encoding='utf-8') as f:
                      readme = f.read()
                  start = '<!-- PROXY_COUNT_START -->'
                  end = '<!-- PROXY_COUNT_END -->'
                  if start in readme and end in readme:
                      readme = re.sub(
                          f'{start}.*?{end}',
                          f'{start}\n{count_str}\n{end}',
                          readme,
                          flags=re.DOTALL
                      )
                      with open('README.md', 'w', encoding='utf-8') as f:
                          f.write(readme)
                      print("📝 README обновлён.")
                  else:
                      print("⚠️ Маркеры не найдены в README.")
              except Exception as e:
                  print(f"⚠️ Не удалось обновить README: {e}")

          if __name__ == "__main__":
              main()
          EOF

          python updater.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.yaml README.md
          git diff --staged --quiet || (
            git commit -m "🔄 Goida 26 config (bulletproof Reality fix) [skip ci]"
            git push
          )
