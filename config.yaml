mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

proxy-providers:
  all-servers:
    type: http
    url: "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/proxies.yaml"
    interval: 3600
    path: ./proxies/provider.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 🚀 Auto-Select
    type: url-test
    proxies:
      - "all-servers"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🌍 Proxy
    type: select
    proxies:
      - 🚀 Auto-Select
      - "all-servers"

  - name: 🛑 Direct
    type: select
    proxies:
      - DIRECT

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - MATCH,🚀 Auto-Select
