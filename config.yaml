mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
proxy-providers:
  all-servers:
    type: http
    url: https://raw.githubusercontent.com/crolankawasaki/Goida26-Clash-v2/main/proxies.yaml
    interval: 3600
    path: ./proxies/provider.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
proxy-groups:
- name: 🚀 Auto-Select
  type: url-test
  proxies:
  - all-servers
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🌍 Global
  type: select
  proxies:
  - 🚀 Auto-Select
  - all-servers
  - DIRECT
- name: 🛑 Direct
  type: select
  proxies:
  - DIRECT
rules:
- DOMAIN-SUFFIX,local,DIRECT
- IP-CIDR,10.0.0.0/8,DIRECT
- IP-CIDR,127.0.0.0/8,DIRECT
- IP-CIDR,172.16.0.0/12,DIRECT
- IP-CIDR,192.168.0.0/16,DIRECT
- MATCH,🚀 Auto-Select
